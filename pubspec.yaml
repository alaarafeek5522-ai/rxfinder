name: rxfinder
description: RxFinder - Medicine Search App by Alaa & Ali
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.2.1
  google_fonts: ^6.2.1
  flutter_slidable: ^3.0.1
  flutter_staggered_animations: ^1.1.1
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  uuid: ^4.3.3
  connectivity_plus: ^6.0.3
  speech_to_text: ^6.6.2
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
